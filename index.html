    // Helper functions
    function timeUntilBirthday() {
      const now = new Date();
      let year = now.getFullYear();
      let target = new Date(year, 8, 14, 0, 0, 0); // September 14
      if (now > target) {
        target = new Date(year + 1, 8, 14, 0, 0, 0);
      }
      const diff = target.getTime() - now.getTime();
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);
      return { days, hours, minutes, seconds, total: diff };
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function HeartRain({ count = 30, active = true }) {
      const [hearts, setHearts] = useState([]);
      useEffect(() => {
        if (!active) return;
        const arr = Array.from({ length: count }).map((_, i) => ({
          id: i,
          left: Math.random() * 100,
          size: 20 + Math.random() * 30,
          duration: 6 + Math.random() * 6,
          delay: Math.random() * 5,
          drift: (Math.random() - 0.5) * 200,
          emoji: RAIN_EMOJIS[Math.floor(Math.random() * RAIN_EMOJIS.length)]

        setHearts(arr);
      }, [count, active]);

      if (!active) return null;
      return (
        <div className="pointer-events-none fixed inset-0 z-0 overflow-hidden">
          {hearts.map((h) => (
            <div
              key={h.id}
              className="heart-float absolute"
              style={{

                fontSize: `${h.size}px`,
                animationDuration: `${h.duration}s`,
                animationDelay: `${h.delay}s`,
                ['--drift']: `${h.drift}px`,
                bottom: 0

    function Confetti({ active, count = 80 }) {
      const [pieces, setPieces] = useState([]);
      useEffect(() => {
        if (!active) return;
        const arr = Array.from({ length: count }).map((_, i) => ({

          left: Math.random() * 100,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          duration: 3 + Math.random() * 3,
          delay: Math.random() * 2,
          size: 6 + Math.random() * 10,
          rotate: Math.random() * 360

        setPieces(arr);
        const timer = setTimeout(() => setPieces([]), 8000);
        return () => clearTimeout(timer);
      }, [active, count]);

      if (!active || pieces.length === 0) return null;
      return (
        <div className="pointer-events-none fixed inset-0 z-[9999]">
          {pieces.map((p) => (

    function HeartCatcher() {
      const [hearts, setHearts] = useState([]);
      const [score, setScore] = useState(0);
      const [missed, setMissed] = useState(0);
      const [time, setTime] = useState(30);
      const [running, setRunning] = useState(false);
      const [finished, setFinished] = useState(false);
      const idRef = useRef(0);

      const start = () => {
        setHearts([]); setScore(0); setMissed(0); setTime(30); setRunning(true); setFinished(false); idRef.current = 0;
      };

      useEffect(() => {
        if (!running) return;
        const spawn = setInterval(() => {
          setHearts((prev) => {
            let next = [...prev];
            if (next.length < 8) {
              next.push({
                id: idRef.current++, x: Math.random() * 90 + 5, y: 0,
                size: 30 + Math.random() * 20, speed: 0.6 + Math.random() * 0.8,
                caught: false, emoji: CATCHER_EMOJIS[Math.floor(Math.random() * CATCHER_EMOJIS.length)]
              });
            }
            return next.map(h => h.caught ? h : { ...h, y: h.y + h.speed }).filter(h => {
              if (h.y >= 95 && !h.caught) { setMissed(m => m + 1); return false; }
              return true;
            });
          });
        }, 400);

        const tick = setInterval(() => {
          setTime((t) => {
            if (t <= 1) { setRunning(false); setFinished(true); return 0; }
            return t - 1;
          });
        }, 1000);
        return () => { clearInterval(spawn); clearInterval(tick); };
      }, [running]);

      return (
        <div className="glass mx-auto max-w-2xl overflow-hidden rounded-3xl p-6 shadow-2xl w-full">
          <h3 className="script-font text-center text-4xl font-bold gradient-text">💖 Catch My Love 💖</h3>

          </div>

            {hearts.map(h => !h.caught && (
              <button key={h.id} onClick={() => { h.caught = true; setScore(s => s + 1); }} className="absolute text-3xl select-none" style={{ left: `${h.x}%`, top: `${h.y}%`, fontSize: `${h.size}px` }}>{h.emoji}</button>
            ))}

                <button onClick={start} className="love-button text-white font-bold px-6 py-3 rounded-full text-xl">{finished ? "Play Again" : "Start Catching Game"}</button>
              </div>
            )}
          </div>
        </div>
      );

    function MemoryGame() {
      const [cards, setCards] = useState([]);
      const [picked, setPicked] = useState([]);
      const [matched, setMatched] = useState(0);

      const init = () => {
        const doubled = [...MEMORY_EMOJIS, ...MEMORY_EMOJIS];
        setCards(shuffle(doubled).map((e, i) => ({ id: i, emoji: e, flipped: false, matched: false })));
        setPicked([]); setMatched(0);
      };

      useEffect(() => {
        if (picked.length === 2) {
          const [a, b] = picked;
          if (cards[a].emoji === cards[b].emoji) {
            setCards(prev => prev.map(c => c.id === a || c.id === b ? { ...c, matched: true } : c));
            setMatched(m => m + 1); setPicked([]);
          } else {
            setTimeout(() => {
              setCards(prev => prev.map(c => c.id === a || c.id === b ? { ...c, flipped: false } : c));
              setPicked([]);
            }, 800);
          }
        }
      }, [picked]);

      return (
        <div className="glass mx-auto max-w-2xl rounded-3xl p-6 shadow-2xl w-full">
          <h3 className="script-font text-center text-3xl font-bold gradient-text">🧠 Memory Game of Us</h3>
          {cards.length === 0 ? (
            <button onClick={init} className="love-button block mx-auto mt-6 text-white px-6 py-2 rounded-full font-bold">Start Matching</button>
          ) : (
            <div className="grid grid-cols-4 gap-2 mt-4">
              {cards.map(c => (
                <button
                  key={c.id}
                  onClick={() => { if (picked.length < 2 && !c.flipped && !c.matched) { c.flipped = true; setPicked([...picked, c.id]); } }}
                  className={`aspect-square rounded-xl text-2xl flex items-center justify-center font-bold transition-all ${c.flipped || c.matched ? "bg-white text-slate-800" : "bg-gradient-to-br from-pink-400 to-rose-400 text-white"}`}
                >
                  {c.flipped || c.matched ? c.emoji : "💖"}
                </button>
              ))}
            </div>
          )}
          {matched === MEMORY_EMOJIS.length && <p className="text-center text-green-600 font-bold mt-4">You matched all memories perfectly! 🎉</p>}
        </div>
      );
    }

    function App() {

        setConfettiActive(true);
        setTimeout(() => setConfettiActive(false), 8500);

      return (
        <div className="w-full relative">
          <HeartRain count={25} active={true} />
          <Confetti active={confettiActive} count={80} />
          <MissingMeter />

          <Hero onReveal={triggerConfetti} />

          <main className="mx-auto max-w-6xl px-4 py-8 space-y-12 relative z-10">
            <section className="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
              <MoodCheck />

            <section className="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">

              <FortuneCookie />

            <section>

            <section>

            <section className="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
              <HeartCatcher />
              <WhackABad />
            </section>

            <section className="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
              <WouldYouRather />
              <LoveQuiz />
            </section>

            <section className="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
              <MemoryGame />
              <LoveQuestion />
            </section>

            <section>
              <LoveLetter />
            </section>
          </main>

          <Ender />
        </div>
      );
    }

    // Mount application layer context instance to viewport window
    const root = RoyalElement = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
